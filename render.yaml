services:
  # 1. The Frontend (The link you will share)
  - type: web
    name: bot-detector-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    publishPath: frontend/dist # Change 'dist' to 'build' if using React
    envVars:
      - key: VITE_API_URL # Or your frontend's API environment variable
        fromService:
          type: web
          name: bot-detector-backend
          property: host

  # 2. The Backend
  - type: web
    name: bot-detector-backend
    env: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bot-db
          property: connectionString

  # 3. The ML Service
  - type: worker
    name: ml-processor
    env: docker
    dockerContext: ./ml-service
    dockerfilePath: ./ml-service/Dockerfile

databases:
  - name: bot-db
    plan: free
