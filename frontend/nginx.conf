server {
    listen ${PORT};
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # FORCE IPv4 (ipv6=off) to prevent "Connection Refused" in Docker loopback networks
    # Using 127.0.0.11 for Docker/Railway internal DNS and 8.8.8.8 for public fallback
    resolver 127.0.0.11 8.8.8.8 valid=30s ipv6=off;

    # Increase proxy buffers for potentially large headers or SSE traffic
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    # React router catch-all
    location / {
        try_files $uri /index.html;
    }

    # Proxy API requests to backend
    location /api/ {
        # Using a variable for the proxy_pass forces Nginx to resolve DNS at runtime
        # instead of startup, preventing crashes if the backend is not yet available.
        set $backend_upstream "${BACKEND_URL}";
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;

        # Standard headers
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # SSE Specific configuration
        proxy_set_header Connection '';
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header X-Accel-Buffering no;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        
        # SSL Handshake fix for public domains
        proxy_ssl_server_name on;
        proxy_ssl_session_reuse on;
        proxy_ssl_verify off;
    }

    # Proxy files downloads /v1/ etc
    location /v1/ {
        set $backend_upstream_v1 "${BACKEND_URL}";
        proxy_pass $backend_upstream_v1;
        proxy_set_header Host $proxy_host;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }
}
