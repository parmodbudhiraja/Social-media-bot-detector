server {
    listen ${PORT};
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Public DNS resolver for dynamic proxy_pass
    resolver 8.8.8.8 valid=30s;

    # React router catch-all
    location / {
        try_files $uri /index.html;
    }

    # Proxy API requests to backend
    location /api/ {
        set $backend_url https://backend-production-95ee.up.railway.app;
        proxy_pass $backend_url;
        proxy_http_version 1.1;
        proxy_set_header Host backend-production-95ee.up.railway.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE Specific configuration
        proxy_set_header Connection '';
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header X-Accel-Buffering no;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        
        # SSL Handshake fix for public domains
        proxy_ssl_server_name on;
        proxy_ssl_session_reuse on;
    }

    # Proxy files downloads /v1/ etc
    location /v1/ {
        set $backend_url https://backend-production-95ee.up.railway.app;
        proxy_pass $backend_url;
        proxy_set_header Host backend-production-95ee.up.railway.app;
        proxy_ssl_server_name on;
    }
}
