
services:
  postgres:
    image: postgres:15-alpine
    container_name: instagram-analyzer-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: jobsdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bot-detector-net

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: instagram-analyzer-rabbitmq
    ports:
      - "5672:5672"   # AMQP protocol port
      - "15672:15672" # Management UI port
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: password
    networks:
      - bot-detector-net

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: instagram-analyzer-ml
    ports:
      - "8000:8000"
    environment:
      - RABBITMQ_HOST=rabbitmq
    networks:
      - bot-detector-net
    depends_on:
      - rabbitmq

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: instagram-analyzer-backend
    hostname: backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/jobsdb
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=admin
      - SPRING_RABBITMQ_PASSWORD=password
      - ML_SERVICE_URL=http://ml-service:8000
      - APIFY_TOKEN=${APIFY_TOKEN:-your-apify-token-here}
    networks:
      - bot-detector-net
    depends_on:
      - postgres
      - rabbitmq
      - ml-service

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: instagram-analyzer-frontend
    ports:
      - "80:80"
    environment:
      - BACKEND_URL=http://backend:8080
      - PORT=80
    networks:
      - bot-detector-net
    depends_on:
      - backend

networks:
  bot-detector-net:
    driver: bridge

volumes:
  postgres_data:
